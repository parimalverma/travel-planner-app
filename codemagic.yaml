workflows:
  android-build:
    name: Android Build

    environment:
      node: 18

    scripts:
      - name: Install Bubblewrap
        script: |
          npm install -g @bubblewrap/cli

      - name: Initialize TWA (strict non-interactive)
        script: |
          bubblewrap init \
            --manifest https://storage.googleapis.com/travel-planner-frontend/manifest.json \
            --directory twa-build \
            --packageId com.travelplanner.app \
            --host storage.googleapis.com \
            --name "Travel Planner" \
            --launcherName "TravelApp" \
            --display standalone \
            --themeColor "#0d6efd" \
            --backgroundColor "#ffffff" \
            --startUrl "/index.html" \
            --iconUrl "https://storage.googleapis.com/travel-planner-frontend/icon-512.png" \
            --maskableIconUrl "https://storage.googleapis.com/travel-planner-frontend/icon-512.png" \
            --skipPwaValidation \
            --skipSigning \
            --useExistingJdk \
            --no-interactive

      - name: Build APK
        script: |
          cd twa-build
          bubblewrap build --skipSigning

    artifacts:
      - twa-build/app-release-unsigned.apk
